spring:
  datasource:
    url: jdbc:mysql://localhost:3306/my_db?useSSL=false&amp;serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: bestuser
    password: bestuser
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
#        format_sql: true

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    enabled: true

  logging:
    level:
      liquibase: DEBUG
      org:
        springframework:
          web: DEBUG
          security: DEBUG
          http: DEBUG
      com:
        example:
          bankcards: DEBUG

  encryption:
    key: c362b68d0793bd37b7b5252f250d4abbe02e671cd98d725d73d63bfd2ca3bda3417c7443
  springdoc:
    swagger-ui:
      path: /swagger-ui.html
      url: /v3/api-docs.yaml
      operations-sorter: alpha
      tags-sorter: alpha
      doc-expansion: none
    api-docs:
      path: /v3/api-docs
      enabled: true
    default-consumes-media-type: application/json
    default-produces-media-type: application/json
    cache:
      disabled: true


server:
  port: 8080

jwt:
  secret: "supersecretjwtkey12345"
  expiration: 3600000
